version: "2"
linters:
  enable:
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    - misspell
    - bodyclose
    - contextcheck
    - containedctx
    - noctx
    - nilerr
    - nilnesserr
    - errchkjson
    - exhaustive
    - nolintlint
    - cyclop
    - unparam
    - goconst
formatters:
  enable:
    - goimports
    - gofumpt
    - gci
    - golines
